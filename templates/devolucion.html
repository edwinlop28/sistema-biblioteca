<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Devolución</title>
</head>
<body>
    <h1>📚 Registrar Devolución</h1>

    <form method="POST">
        <label>ISBN del libro:</label>
        <input type="text" name="isbn" required><br><br>
        <button type="submit">Buscar</button>
    </form>

    {% if prestamo %}
    <hr>
    <h3>Préstamo encontrado:</h3>
    <p>ID: {{ prestamo[0] }}</p>
    <p>Libro: {{ prestamo[1] }}</p>
    <p>Cliente: {{ prestamo[2] }}</p>
    <p>Prestado por: {{ prestamo[3] }}</p>
    <p>Fecha préstamo: {{ prestamo[5] }}</p>
    <p>Vence: {{ prestamo[6] }}</p>

    <form method="POST">
        <input type="hidden" name="id_prestamo" value="{{ prestamo[0] }}">
        <button type="submit">Confirmar Devolución</button>
    </form>
    {% endif %}

    <a href="/empleado">Volver</a>
</body>
</html>
