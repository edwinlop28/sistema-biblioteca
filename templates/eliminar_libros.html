
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Libro</title>
</head>
<body>
    <h1>🗑️ Eliminar Libro</h1>

    <table border="1">
        <tr>
            <th>ISBN</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Disponibles</th>
            <th>Acción</th>
        </tr>
        {% for libro in libros %}
        <tr>
            <td>{{ libro[0] }}</td>
            <td>{{ libro[1] }}</td>
            <td>{{ libro[2] }}</td>
            <td>{{ libro[6] }}</td>
            <td>
                <form method="POST">
                    <input type="hidden" name="isbn" value="{{ libro[0] }}">
                    <button type="submit">Eliminar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="/empleado">Volver</a>
</body>
</html>
