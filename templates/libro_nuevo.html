{% extends "base.html" %}

{% block title %}Agregar Libro - BiblioSystem{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header" style="background-color: var(--verde-oscuro);">
                <h5 class="text-white mb-0">
                    <i class="fas fa-plus me-2"></i>Agregar Libro
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">ISBN</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-barcode"></i></span>
                            <input type="text" name="isbn" class="form-control" placeholder="Ingresa el ISBN" required>
                        </div>
                        <small class="text-muted">Si el ISBN está en la API se llenará automáticamente</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Título</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-book"></i></span>
                            <input type="text" name="titulo" class="form-control" placeholder="Título del libro" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Autor</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="autor" class="form-control" placeholder="Autor del libro required">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Editorial</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-building"></i></span>
                            <input type="text" name="editorial" class="form-control" placeholder="Editorial required">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Año</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                            <input type="text" name="año_publicacion" class="form-control" placeholder="Año de publicación required">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Cantidad de ejemplares</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-hashtag"></i></span>
                            <input type="number" name="cantidad" class="form-control" placeholder="Cantidad" min="1" required>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-biblioteca">
                            <i class="fas fa-check me-2"></i>Agregar Libro
                        </button>
                        <a href="/empleado" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Volver
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
